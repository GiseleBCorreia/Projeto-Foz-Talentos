<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acesso administrativo da Foz Talentos.">
  <title>Login Administrativo | Foz Talentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-login-page">
  <header class="header">
    <div class="container nav">
      <a class="logo" href="index.html" aria-label="Foz Talentos">
        <img src="img/logo-foz-talentos.png" alt="Foz Talentos — Recrutamento e Seleção">
      </a>

      <button class="menu-button" type="button" aria-label="Abrir menu" aria-expanded="false" onclick="document.body.classList.toggle('menu-open')">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav-links">
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="servicos.html">Serviços</a>
        <a href="vagas.html">Vagas</a>
        <a href="contato.html">Contato</a>
        <a class="admin-link active" href="admin-login.html">Login ADM</a>
      </nav>
    </div>
  </header>

  <main class="admin-login-main">
    <section class="admin-login-card">
      <div class="admin-login-brand">
        <img src="img/logo-foz-talentos.png" alt="Foz Talentos">
      </div>

      <span class="admin-lock">🔒</span>
      <h1>Acesso administrativo</h1>
      <p>Entre com suas credenciais para acessar o painel de gerenciamento de vagas.</p>

      <form id="adminLoginForm" class="admin-login-form">
        <label for="adminEmail">
          E-mail
          <input
            type="email"
            id="adminEmail"
            name="email"
            placeholder="admin@foztalentos.com.br"
            autocomplete="email"
            required
          >
        </label>

        <label for="adminSenha">
          Senha
          <div class="password-field">
            <input
              type="password"
              id="adminSenha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            >
            <button type="button" id="toggleSenha" aria-label="Mostrar senha">👁</button>
          </div>
        </label>

        <div class="admin-login-options">
          <label class="remember">
            <input type="checkbox">
            <span>Lembrar de mim</span>
          </label>
          <a href="#" onclick="event.preventDefault(); alert('A recuperação de senha será conectada ao back-end posteriormente.')">
            Esqueci minha senha
          </a>
        </div>

        <button class="button button-primary admin-submit" type="submit">
          Entrar
        </button>

        <p id="loginMessage" class="login-message" aria-live="polite"></p>
      </form>

      <a class="back-site" href="index.html">← Voltar para o site</a>
    </section>
  </main>

  <script>
    const senhaInput = document.getElementById("adminSenha");
    const toggleSenha = document.getElementById("toggleSenha");
    const formulario = document.getElementById("adminLoginForm");
    const mensagem = document.getElementById("loginMessage");

    toggleSenha.addEventListener("click", () => {
      const mostrando = senhaInput.type === "text";
      senhaInput.type = mostrando ? "password" : "text";
      toggleSenha.textContent = mostrando ? "👁" : "🙈";
      toggleSenha.setAttribute("aria-label", mostrando ? "Mostrar senha" : "Ocultar senha");
    });

    formulario.addEventListener("submit", (event) => {
      event.preventDefault();
      mensagem.textContent = "Tela pronta. O login real será conectado ao back-end.";
      mensagem.className = "login-message show";
    });
  </script>
</body>
</html>
